name: Release

on:
  push:
    branches: [main]
    paths:
      - 'packages/*/src/**'
      - '!packages/*/src/**/*.test.ts'
      - '!packages/*/src/**/*.spec.ts'
      - 'packages/*/package.json'
      - 'package.json'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (skip publish)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install
        run: pnpm install --frozen-lockfile

      # --- Version bump ---
      - name: Bump version
        id: bump
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump || 'patch' }}"
          node scripts/bump.mjs "$BUMP_TYPE"
          NEW=$(node -p 'require("./package.json").version')
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Verify version consistency
        run: node scripts/sync-version.mjs --check

      # --- Build & Test ---
      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test:unit

      # --- Commit, Tag, Publish ---
      - name: Commit version bump & create tag
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit (v${VERSION} tag may already exist)"
          else
            git commit -m "chore: release v${VERSION}"
          fi
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin main --follow-tags

      - name: Publish to npm
        if: ${{ !github.event.inputs.dry_run }}
        run: pnpm publish -r --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run }}
        run: |
          echo "### Dry Run" >> $GITHUB_STEP_SUMMARY
          echo "Would have released: v${{ steps.bump.outputs.version }}" >> $GITHUB_STEP_SUMMARY
